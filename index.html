<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Denston — Photo Gallery</title>
<meta name="robots" content="noindex, nofollow" />
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f242e;
    --text: #e8eaed;
    --muted: #9aa3b2;
    --accent: #4f9dff;
    --accent-2: #2f7ae0;
    --good: #34c759;
    --border: #2a3140;
    --danger: #ff5d5d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 28px 20px 16px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0; font-size: 28px; letter-spacing: 4px; font-weight: 600; }
  header p { margin: 6px 0 0; color: var(--muted); font-size: 14px; }

  .toolbar {
    position: sticky; top: 0; z-index: 20;
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    padding: 12px 16px;
    background: rgba(15,17,21,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
  }
  .toolbar .count { color: var(--muted); font-size: 14px; margin-right: auto; }
  .toolbar .count strong { color: var(--text); }
  button {
    font: inherit; cursor: pointer; border-radius: 8px;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
    padding: 9px 14px; transition: background .15s, border-color .15s, opacity .15s;
  }
  button:hover { background: #283040; }
  button.primary { background: var(--accent-2); border-color: var(--accent-2); font-weight: 600; }
  button.primary:hover { background: var(--accent); }
  button:disabled { opacity: .45; cursor: not-allowed; }

  /* Justified rows layout (Lightroom-style) */
  #grid { padding: 12px; }
  .row { display: flex; }            /* gap + heights set inline by JS */
  .card {
    position: relative;
    overflow: hidden;
    border-radius: 6px;
    cursor: pointer;
    background: var(--panel);
    border: 2px solid transparent;
    flex: 0 0 auto;
  }
  .card img {
    width: 100%; height: 100%; object-fit: cover; display: block; background: var(--panel);
    -webkit-user-drag: none; user-select: none; -webkit-user-select: none;
  }
  .card::after {
    content: ""; position: absolute; inset: 0;
    background: rgba(79,157,255,0); transition: background .15s;
    pointer-events: none;
  }
  .card.selected { border-color: var(--accent); }
  .card.selected::after { background: rgba(79,157,255,.18); }

  /* Selection radio (top-left) */
  .sel {
    position: absolute; top: 7px; left: 7px;
    width: 26px; height: 26px; padding: 0;
    border-radius: 50%;
    background: rgba(0,0,0,.5);
    border: 2px solid rgba(255,255,255,.9);
    display: flex; align-items: center; justify-content: center;
    color: #fff; opacity: .9;
    transition: background .15s, border-color .15s, transform .1s;
    z-index: 3;
  }
  .sel:hover { transform: scale(1.08); background: rgba(0,0,0,.7); }
  .sel svg { width: 14px; height: 14px; opacity: 0; transition: opacity .12s; }
  .card.selected .sel { background: var(--good); border-color: var(--good); opacity: 1; }
  .card.selected .sel svg { opacity: 1; }

  /* Hover "view" hint (bottom-right) */
  .view-hint {
    position: absolute; bottom: 7px; right: 7px;
    width: 30px; height: 30px; border-radius: 7px;
    background: rgba(0,0,0,.55); border: 1px solid rgba(255,255,255,.25);
    color: #fff; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .15s, background .15s; z-index: 3; padding: 0;
  }
  .card:hover .view-hint { opacity: 1; }
  .view-hint:hover { background: rgba(0,0,0,.85); }

  /* Passcode modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    display: none; align-items: center; justify-content: center; z-index: 80; padding: 20px;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 24px; width: 100%; max-width: 380px; text-align: center;
  }
  .modal h2 { margin: 0 0 6px; font-size: 19px; }
  .modal p { margin: 0 0 16px; color: var(--muted); font-size: 14px; }
  .modal input {
    width: 100%; font: inherit; padding: 11px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
    text-align: center; letter-spacing: 2px; margin-bottom: 8px;
  }
  .modal input:focus { outline: none; border-color: var(--accent); }
  .modal .err { color: var(--danger); font-size: 13px; min-height: 18px; margin: 0 0 10px; }
  .modal .row2 { display: flex; gap: 8px; }
  .modal .row2 button { flex: 1; }

  /* Lightbox / viewer */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,.94);
    display: none; flex-direction: column; z-index: 70;
  }
  .lightbox.show { display: flex; }
  .lb-top {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .lb-select {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 8px 14px 8px 10px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
    font-weight: 600;
  }
  .lb-select .radio {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.8); background: transparent;
    display: flex; align-items: center; justify-content: center; color: #fff;
  }
  .lb-select .radio svg { width: 13px; height: 13px; opacity: 0; }
  .lb-select.on { background: var(--good); border-color: var(--good); color: #04210d; }
  .lb-select.on .radio { border-color: #fff; background: rgba(255,255,255,.25); }
  .lb-select.on .radio svg { opacity: 1; }
  .lb-name { color: var(--muted); font-size: 13px; }
  .lb-counter { color: var(--muted); font-size: 13px; margin-left: auto; }
  .lb-close { background: none; border: none; color: #fff; font-size: 28px; line-height: 1; padding: 0 4px; cursor: pointer; }
  .lb-stage {
    flex: 1; position: relative; display: flex; align-items: center; justify-content: center;
    padding: 16px; min-height: 0;
  }
  .lb-stage img {
    max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 6px;
    -webkit-user-drag: none; user-select: none; -webkit-user-select: none;
  }
  .lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(0,0,0,.45); border: 1px solid rgba(255,255,255,.25); color: #fff;
    font-size: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .lb-nav:hover { background: rgba(0,0,0,.8); }
  .lb-prev { left: 18px; } .lb-next { right: 18px; }

  /* Progress toast */
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; min-width: 260px; display: none; z-index: 90;
    box-shadow: 0 8px 30px rgba(0,0,0,.4);
  }
  .toast.show { display: block; }
  .toast .label { font-size: 14px; margin-bottom: 8px; }
  .toast .bar { height: 6px; border-radius: 3px; background: var(--panel-2); overflow: hidden; }
  .toast .bar > span { display: block; height: 100%; width: 0%; background: var(--accent); transition: width .2s; }

  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 24px 16px 40px; }
</style>
</head>
<body>
  <header>
    <h1>DENSTON</h1>
    <p id="subtitle">Loading photos…</p>
  </header>

  <div class="toolbar">
    <span class="count" id="count"><strong>0</strong> selected</span>
    <button id="selectAllBtn">Select all</button>
    <button id="clearBtn">Clear</button>
    <button id="downloadBtn" class="primary" disabled>Download selected</button>
  </div>

  <div id="grid"></div>

  <footer>Tip: click a photo to view it full-size · click the circle to select · shift-click to select a range. Enter the shared passcode to download.</footer>

  <!-- Passcode modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>Enter passcode</h2>
      <p id="modalSub">Required to download your selected photos.</p>
      <input type="password" id="passInput" placeholder="Passcode" autocomplete="off" />
      <p class="err" id="passErr"></p>
      <div class="row2">
        <button id="cancelBtn">Cancel</button>
        <button id="unlockBtn" class="primary">Unlock &amp; download</button>
      </div>
    </div>
  </div>

  <!-- Lightbox / viewer -->
  <div class="lightbox" id="lightbox">
    <div class="lb-top">
      <button class="lb-select" id="lbSelect" title="Select this photo (Space)">
        <span class="radio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
        <span id="lbSelectLabel">Select</span>
      </button>
      <span class="lb-name" id="lbName"></span>
      <span class="lb-counter" id="lbCounter"></span>
      <button class="lb-close" id="lbClose" title="Close (Esc)">&times;</button>
    </div>
    <div class="lb-stage">
      <button class="lb-nav lb-prev" id="lbPrev" title="Previous (←)">&#8249;</button>
      <img id="lbImg" alt="" draggable="false" />
      <button class="lb-nav lb-next" id="lbNext" title="Next (→)">&#8250;</button>
    </div>
  </div>

  <!-- Progress toast -->
  <div class="toast" id="toast">
    <div class="label" id="toastLabel">Preparing…</div>
    <div class="bar"><span id="toastBar"></span></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
  // ============================================================
  //  PASSCODE  (light client-side gate only — not real security)
  //  To change it: run in a terminal —
  //    printf '%s' 'YOURNEWCODE' | shasum -a 256
  //  then paste the resulting hex below.
  //  Current passcode hash is for: fphrc
  // ============================================================
  const PASSCODE_HASH = "ed76c1f1c74cb2f309d81560fdb5a56d6f6387431517bddcc54a117a15809194";

  const PHOTOS_DIR = "photos/";    // full-resolution originals — used only for the ZIP download
  const PREVIEW_DIR = "preview/";  // ~1600px medium images — used by the full-screen viewer
  const THUMBS_DIR = "thumbs/";    // ~600px thumbnails — used by the grid
  const SESSION_KEY = "denston_unlocked";

  // Layout tuning
  const GAP = 6;       // px between images
  const PAD = 12;      // #grid padding (matches CSS)

  const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
  const VIEW_SVG  = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>';

  let items = [];                 // [{name, w, h, aspect}]
  const cardEls = [];             // card DOM nodes, index-aligned
  const selected = new Set();     // selected filenames
  let anchor = null;              // index anchor for shift-range selection
  let viewerIndex = -1;           // current lightbox index

  const grid = document.getElementById("grid");
  const countEl = document.getElementById("count");
  const subtitle = document.getElementById("subtitle");
  const selectAllBtn = document.getElementById("selectAllBtn");
  const clearBtn = document.getElementById("clearBtn");
  const downloadBtn = document.getElementById("downloadBtn");

  const overlay = document.getElementById("overlay");
  const passInput = document.getElementById("passInput");
  const passErr = document.getElementById("passErr");
  const unlockBtn = document.getElementById("unlockBtn");
  const cancelBtn = document.getElementById("cancelBtn");

  const lightbox = document.getElementById("lightbox");
  const lbImg = document.getElementById("lbImg");
  const lbName = document.getElementById("lbName");
  const lbCounter = document.getElementById("lbCounter");
  const lbClose = document.getElementById("lbClose");
  const lbPrev = document.getElementById("lbPrev");
  const lbNext = document.getElementById("lbNext");
  const lbSelect = document.getElementById("lbSelect");
  const lbSelectLabel = document.getElementById("lbSelectLabel");

  const toast = document.getElementById("toast");
  const toastLabel = document.getElementById("toastLabel");
  const toastBar = document.getElementById("toastBar");

  const enc = encodeURIComponent;

  // ---- Load manifest, build cards, lay out ----
  fetch("manifest.json")
    .then(r => r.json())
    .then(list => {
      // Support both new {name,w,h} and legacy ["name", ...] manifests
      items = list.map(x => typeof x === "string"
        ? { name: x, w: 3, h: 2, aspect: 1.5 }
        : { name: x.name, w: x.w, h: x.h, aspect: (x.w && x.h) ? x.w / x.h : 1.5 });
      subtitle.textContent = items.length + " photos · click to view · select what you want, then download";
      buildCards();
      layout();
    })
    .catch(() => { subtitle.textContent = "Could not load photo list."; });

  function buildCards() {
    items.forEach((it, i) => {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.index = i;
      card.innerHTML =
        '<img loading="lazy" draggable="false" src="' + THUMBS_DIR + enc(it.name) + '" alt="' + it.name + '">' +
        '<button class="sel" title="Select (shift-click for range)" aria-label="Select">' + CHECK_SVG + '</button>' +
        '<button class="view-hint" title="View full size" aria-label="View full size">' + VIEW_SVG + '</button>';

      const img = card.querySelector("img");
      img.addEventListener("load", () => {
        const a = img.naturalWidth / img.naturalHeight;
        if (a && Math.abs(a - it.aspect) > 0.01) { it.aspect = a; scheduleLayout(); }
      });

      // Click image body: shift = range-select, plain = open viewer
      card.addEventListener("click", (e) => {
        if (e.target.closest(".sel") || e.target.closest(".view-hint")) return;
        if (e.shiftKey) selectAction(i, true);
        else openViewer(i);
      });
      card.querySelector(".sel").addEventListener("click", (e) => {
        e.stopPropagation();
        selectAction(i, e.shiftKey);
      });
      card.querySelector(".view-hint").addEventListener("click", (e) => {
        e.stopPropagation();
        openViewer(i);
      });

      cardEls[i] = card;
    });
  }

  // ---- Justified-rows layout ----
  function layout() {
    if (!items.length) return;
    const avail = grid.clientWidth - PAD * 2;
    if (avail <= 0) return;
    const target = avail < 560 ? 150 : (avail < 900 ? 200 : 240);

    const rows = [];
    let cur = [], arSum = 0;
    for (let i = 0; i < items.length; i++) {
      cur.push(i);
      arSum += items[i].aspect;
      const h = (avail - GAP * (cur.length - 1)) / arSum;
      if (h <= target) { rows.push({ idx: cur, h }); cur = []; arSum = 0; }
    }
    if (cur.length) {
      let h = (avail - GAP * (cur.length - 1)) / arSum;
      h = Math.min(h, target);  // don't stretch a short final row
      rows.push({ idx: cur, h, last: true });
    }

    const frag = document.createDocumentFragment();
    rows.forEach(row => {
      const rowEl = document.createElement("div");
      rowEl.className = "row";
      rowEl.style.gap = GAP + "px";
      rowEl.style.marginBottom = GAP + "px";
      row.idx.forEach(i => {
        const card = cardEls[i];
        const w = Math.round(row.h * items[i].aspect);
        card.style.width = w + "px";
        card.style.height = Math.round(row.h) + "px";
        rowEl.appendChild(card);
      });
      frag.appendChild(rowEl);
    });
    grid.replaceChildren(frag);
  }

  let layoutTimer = null;
  function scheduleLayout() {
    clearTimeout(layoutTimer);
    layoutTimer = setTimeout(layout, 120);
  }
  window.addEventListener("resize", scheduleLayout);

  // ---- Selection ----
  function setSel(i, on) {
    const name = items[i].name;
    if (on) { selected.add(name); cardEls[i].classList.add("selected"); }
    else { selected.delete(name); cardEls[i].classList.remove("selected"); }
    if (i === viewerIndex) updateViewerSelState();
  }
  function toggleOne(i) { setSel(i, !selected.has(items[i].name)); }
  function rangeSelect(a, b) {
    const lo = Math.min(a, b), hi = Math.max(a, b);
    for (let i = lo; i <= hi; i++) setSel(i, true);  // adds range, keeps prior selection
  }
  // Core handler: shift = range from anchor (preserving existing); plain = toggle + set anchor
  function selectAction(i, shift) {
    if (shift && anchor !== null) rangeSelect(anchor, i);
    else { toggleOne(i); anchor = i; }
    updateUI();
  }

  function updateUI() {
    const n = selected.size;
    countEl.innerHTML = "<strong>" + n + "</strong> selected";
    downloadBtn.disabled = n === 0;
    selectAllBtn.textContent = (n === items.length && n > 0) ? "Deselect all" : "Select all";
  }

  selectAllBtn.addEventListener("click", () => {
    const all = selected.size === items.length && items.length > 0;
    for (let i = 0; i < items.length; i++) setSel(i, !all);
    updateUI();
  });
  clearBtn.addEventListener("click", () => {
    for (let i = 0; i < items.length; i++) setSel(i, false);
    anchor = null;
    updateUI();
  });

  // ---- Lightbox / viewer ----
  function openViewer(i) { viewerIndex = i; showViewer(); lightbox.classList.add("show"); }
  function closeViewer() { lightbox.classList.remove("show"); lbImg.src = ""; viewerIndex = -1; }
  function showViewer() {
    const it = items[viewerIndex];
    lbImg.src = PREVIEW_DIR + enc(it.name);
    lbImg.alt = it.name;
    lbName.textContent = it.name;
    lbCounter.textContent = (viewerIndex + 1) + " / " + items.length;
    updateViewerSelState();
    preloadNeighbors();
  }
  function updateViewerSelState() {
    if (viewerIndex < 0) return;
    const on = selected.has(items[viewerIndex].name);
    lbSelect.classList.toggle("on", on);
    lbSelectLabel.textContent = on ? "Selected" : "Select";
  }
  function viewerStep(d) {
    if (viewerIndex < 0) return;
    viewerIndex = (viewerIndex + d + items.length) % items.length;
    showViewer();
  }
  function preloadNeighbors() {
    [1, -1].forEach(d => {
      const j = (viewerIndex + d + items.length) % items.length;
      const im = new Image();
      im.src = PREVIEW_DIR + enc(items[j].name);
    });
  }
  lbClose.addEventListener("click", closeViewer);
  lbPrev.addEventListener("click", () => viewerStep(-1));
  lbNext.addEventListener("click", () => viewerStep(1));
  lbSelect.addEventListener("click", () => {
    toggleOne(viewerIndex); anchor = viewerIndex; updateUI();
  });
  // click backdrop (outside image/controls) closes
  document.querySelector(".lb-stage").addEventListener("click", (e) => {
    if (e.target.classList.contains("lb-stage")) closeViewer();
  });

  // ---- Passcode + download ----
  async function sha256hex(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  downloadBtn.addEventListener("click", () => {
    if (selected.size === 0) return;
    if (selected.size > 150 &&
        !confirm("You've selected " + selected.size + " photos. Building this ZIP may take a while and use a lot of memory. Continue?")) return;
    if (sessionStorage.getItem(SESSION_KEY) === "1") startDownload();
    else { passErr.textContent = ""; passInput.value = ""; overlay.classList.add("show"); setTimeout(() => passInput.focus(), 50); }
  });
  cancelBtn.addEventListener("click", () => overlay.classList.remove("show"));
  overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.classList.remove("show"); });
  passInput.addEventListener("keydown", (e) => { if (e.key === "Enter") unlockBtn.click(); });
  unlockBtn.addEventListener("click", async () => {
    const entered = passInput.value;
    if (!entered) { passErr.textContent = "Please enter the passcode."; return; }
    if (await sha256hex(entered) === PASSCODE_HASH) {
      sessionStorage.setItem(SESSION_KEY, "1");
      overlay.classList.remove("show");
      startDownload();
    } else { passErr.textContent = "Incorrect passcode. Try again."; passInput.select(); }
  });

  async function startDownload() {
    const names = items.filter(it => selected.has(it.name)).map(it => it.name);
    showToast("Preparing…", 0);
    const zip = new JSZip();
    let done = 0;
    for (const name of names) {
      try {
        const resp = await fetch(PHOTOS_DIR + enc(name));
        if (!resp.ok) throw new Error(resp.status);
        zip.file(name, await resp.blob());
      } catch (err) { console.error("Failed to fetch", name, err); }
      done++;
      showToast("Adding photos " + done + " / " + names.length + "…", (done / names.length) * 70);
    }
    const content = await zip.generateAsync(
      { type: "blob", compression: "STORE" },
      (meta) => showToast("Compressing… " + Math.round(meta.percent) + "%", 70 + meta.percent * 0.3)
    );
    showToast("Starting download…", 100);
    const url = URL.createObjectURL(content);
    const a = document.createElement("a");
    a.href = url;
    a.download = names.length === 1 ? names[0] : "denston-photos.zip";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
    setTimeout(hideToast, 1500);
  }
  function showToast(label, pct) { toast.classList.add("show"); toastLabel.textContent = label; toastBar.style.width = Math.min(100, Math.max(0, pct)) + "%"; }
  function hideToast() { toast.classList.remove("show"); }

  // ---- Right-click deterrent: suppress the context menu over images ----
  // (Deterrent only — originals are still reachable by direct URL / cache / DevTools.)
  document.addEventListener("contextmenu", (e) => {
    if (e.target.closest("#grid img, .lb-stage img")) e.preventDefault();
  });

  // ---- Keyboard ----
  document.addEventListener("keydown", (e) => {
    if (overlay.classList.contains("show")) {
      if (e.key === "Escape") overlay.classList.remove("show");
      return;
    }
    if (lightbox.classList.contains("show")) {
      if (e.key === "Escape") closeViewer();
      else if (e.key === "ArrowRight") { e.preventDefault(); viewerStep(1); }
      else if (e.key === "ArrowLeft") { e.preventDefault(); viewerStep(-1); }
      else if (e.key === " ") { e.preventDefault(); toggleOne(viewerIndex); anchor = viewerIndex; updateUI(); }
    }
  });
  </script>
</body>
</html>
