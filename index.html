<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Denston — Photo Gallery</title>
<meta name="robots" content="noindex, nofollow" />
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f242e;
    --text: #e8eaed;
    --muted: #9aa3b2;
    --accent: #4f9dff;
    --accent-2: #2f7ae0;
    --good: #34c759;
    --border: #2a3140;
    --danger: #ff5d5d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 28px 20px 16px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    margin: 0;
    font-size: 28px;
    letter-spacing: 4px;
    font-weight: 600;
  }
  header p { margin: 6px 0 0; color: var(--muted); font-size: 14px; }

  .toolbar {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: rgba(15,17,21,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
  }
  .toolbar .count { color: var(--muted); font-size: 14px; margin-right: auto; }
  .toolbar .count strong { color: var(--text); }
  button {
    font: inherit;
    cursor: pointer;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    padding: 9px 14px;
    transition: background .15s, border-color .15s, opacity .15s;
  }
  button:hover { background: #283040; }
  button.primary {
    background: var(--accent-2);
    border-color: var(--accent-2);
    font-weight: 600;
  }
  button.primary:hover { background: var(--accent); }
  button:disabled { opacity: .45; cursor: not-allowed; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    padding: 16px;
  }
  .card {
    position: relative;
    aspect-ratio: 3 / 2;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    background: var(--panel);
    border: 2px solid transparent;
    outline: none;
  }
  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform .25s, filter .15s;
    background: var(--panel);
  }
  .card:hover img { transform: scale(1.04); }
  .card.selected { border-color: var(--accent); }
  .card.selected img { filter: brightness(.85); }

  .check {
    position: absolute;
    top: 8px; left: 8px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(0,0,0,.45);
    border: 2px solid rgba(255,255,255,.85);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 15px; line-height: 1;
    transition: background .15s, border-color .15s;
  }
  .card.selected .check { background: var(--good); border-color: var(--good); }
  .check svg { width: 14px; height: 14px; opacity: 0; transition: opacity .12s; }
  .card.selected .check svg { opacity: 1; }

  .view-btn {
    position: absolute;
    bottom: 8px; right: 8px;
    width: 30px; height: 30px;
    border-radius: 7px;
    background: rgba(0,0,0,.5);
    border: 1px solid rgba(255,255,255,.25);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity .15s, background .15s;
    padding: 0;
  }
  .card:hover .view-btn { opacity: 1; }
  .view-btn:hover { background: rgba(0,0,0,.8); }

  /* Modal */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    display: none;
    align-items: center; justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .modal h2 { margin: 0 0 6px; font-size: 19px; }
  .modal p { margin: 0 0 16px; color: var(--muted); font-size: 14px; }
  .modal input {
    width: 100%;
    font: inherit;
    padding: 11px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .modal input:focus { outline: none; border-color: var(--accent); }
  .modal .err { color: var(--danger); font-size: 13px; min-height: 18px; margin: 0 0 10px; }
  .modal .row { display: flex; gap: 8px; }
  .modal .row button { flex: 1; }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.9);
    display: none;
    align-items: center; justify-content: center;
    z-index: 60;
    padding: 24px;
  }
  .lightbox.show { display: flex; }
  .lightbox img {
    max-width: 95vw; max-height: 90vh;
    border-radius: 8px;
    object-fit: contain;
  }
  .lightbox .close {
    position: absolute; top: 16px; right: 20px;
    font-size: 30px; color: #fff; cursor: pointer;
    background: none; border: none; line-height: 1;
  }

  /* Progress toast */
  .toast {
    position: fixed;
    left: 50%; bottom: 24px;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    min-width: 260px;
    display: none;
    z-index: 70;
    box-shadow: 0 8px 30px rgba(0,0,0,.4);
  }
  .toast.show { display: block; }
  .toast .label { font-size: 14px; margin-bottom: 8px; }
  .toast .bar { height: 6px; border-radius: 3px; background: var(--panel-2); overflow: hidden; }
  .toast .bar > span { display: block; height: 100%; width: 0%; background: var(--accent); transition: width .2s; }

  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 24px 16px 40px; }
</style>
</head>
<body>
  <header>
    <h1>DENSTON</h1>
    <p id="subtitle">Loading photos…</p>
  </header>

  <div class="toolbar">
    <span class="count" id="count">0 selected</span>
    <button id="selectAllBtn">Select all</button>
    <button id="clearBtn">Clear</button>
    <button id="downloadBtn" class="primary" disabled>Download selected</button>
  </div>

  <div class="grid" id="grid"></div>

  <footer>Enter the shared passcode to download. Photos © their owner.</footer>

  <!-- Passcode modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>Enter passcode</h2>
      <p id="modalSub">Required to download your selected photos.</p>
      <input type="password" id="passInput" placeholder="Passcode" autocomplete="off" />
      <p class="err" id="passErr"></p>
      <div class="row">
        <button id="cancelBtn">Cancel</button>
        <button id="unlockBtn" class="primary">Unlock &amp; download</button>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="close" id="lightboxClose">&times;</button>
    <img id="lightboxImg" alt="" />
  </div>

  <!-- Progress toast -->
  <div class="toast" id="toast">
    <div class="label" id="toastLabel">Preparing…</div>
    <div class="bar"><span id="toastBar"></span></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
  // ============================================================
  //  PASSCODE  (light client-side gate only — not real security)
  //  To change it: run in a terminal —
  //    printf '%s' 'YOURNEWCODE' | shasum -a 256
  //  then paste the resulting hex below.
  //  Current passcode hash is for: fphrc
  // ============================================================
  const PASSCODE_HASH = "ed76c1f1c74cb2f309d81560fdb5a56d6f6387431517bddcc54a117a15809194";

  const PHOTOS_DIR = "photos/";
  const THUMBS_DIR = "thumbs/";
  const SESSION_KEY = "denston_unlocked";

  const selected = new Set();
  let files = [];

  const grid = document.getElementById("grid");
  const countEl = document.getElementById("count");
  const subtitle = document.getElementById("subtitle");
  const selectAllBtn = document.getElementById("selectAllBtn");
  const clearBtn = document.getElementById("clearBtn");
  const downloadBtn = document.getElementById("downloadBtn");

  const overlay = document.getElementById("overlay");
  const passInput = document.getElementById("passInput");
  const passErr = document.getElementById("passErr");
  const unlockBtn = document.getElementById("unlockBtn");
  const cancelBtn = document.getElementById("cancelBtn");

  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");
  const lightboxClose = document.getElementById("lightboxClose");

  const toast = document.getElementById("toast");
  const toastLabel = document.getElementById("toastLabel");
  const toastBar = document.getElementById("toastBar");

  const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

  // ---- Load manifest and build grid ----
  fetch("manifest.json")
    .then(r => r.json())
    .then(list => {
      files = list;
      subtitle.textContent = list.length + " photos · select the ones you want, then download";
      const frag = document.createDocumentFragment();
      list.forEach(name => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.name = name;
        card.tabIndex = 0;
        card.setAttribute("role", "button");
        card.setAttribute("aria-pressed", "false");
        card.innerHTML =
          '<img loading="lazy" src="' + THUMBS_DIR + encodeURIComponent(name) + '" alt="' + name + '">' +
          '<div class="check">' + CHECK_SVG + '</div>' +
          '<button class="view-btn" title="View larger" aria-label="View larger">' +
            '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
          '</button>';
        frag.appendChild(card);
      });
      grid.appendChild(frag);
    })
    .catch(() => {
      subtitle.textContent = "Could not load photo list.";
    });

  // ---- Selection ----
  function toggle(name, card) {
    if (selected.has(name)) {
      selected.delete(name);
      card.classList.remove("selected");
      card.setAttribute("aria-pressed", "false");
    } else {
      selected.add(name);
      card.classList.add("selected");
      card.setAttribute("aria-pressed", "true");
    }
    updateUI();
  }

  function updateUI() {
    const n = selected.size;
    countEl.innerHTML = "<strong>" + n + "</strong> selected";
    downloadBtn.disabled = n === 0;
    selectAllBtn.textContent = (n === files.length && n > 0) ? "Deselect all" : "Select all";
  }

  grid.addEventListener("click", (e) => {
    const card = e.target.closest(".card");
    if (!card) return;
    if (e.target.closest(".view-btn")) {
      openLightbox(card.dataset.name);
      return;
    }
    toggle(card.dataset.name, card);
  });
  grid.addEventListener("keydown", (e) => {
    if (e.key !== "Enter" && e.key !== " ") return;
    const card = e.target.closest(".card");
    if (!card) return;
    e.preventDefault();
    toggle(card.dataset.name, card);
  });

  selectAllBtn.addEventListener("click", () => {
    const allSelected = selected.size === files.length && files.length > 0;
    document.querySelectorAll(".card").forEach(card => {
      const name = card.dataset.name;
      if (allSelected) {
        selected.delete(name);
        card.classList.remove("selected");
        card.setAttribute("aria-pressed", "false");
      } else {
        selected.add(name);
        card.classList.add("selected");
        card.setAttribute("aria-pressed", "true");
      }
    });
    updateUI();
  });

  clearBtn.addEventListener("click", () => {
    selected.clear();
    document.querySelectorAll(".card.selected").forEach(c => {
      c.classList.remove("selected");
      c.setAttribute("aria-pressed", "false");
    });
    updateUI();
  });

  // ---- Lightbox ----
  function openLightbox(name) {
    lightboxImg.src = PHOTOS_DIR + encodeURIComponent(name);
    lightbox.classList.add("show");
  }
  function closeLightbox() {
    lightbox.classList.remove("show");
    lightboxImg.src = "";
  }
  lightboxClose.addEventListener("click", closeLightbox);
  lightbox.addEventListener("click", (e) => { if (e.target === lightbox) closeLightbox(); });

  // ---- Passcode + download ----
  async function sha256hex(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  downloadBtn.addEventListener("click", () => {
    if (selected.size === 0) return;
    // Soft warning for very large selections (heavy in-browser zip)
    if (selected.size > 150 &&
        !confirm("You've selected " + selected.size + " photos. Building this ZIP may take a while and use a lot of memory. Continue?")) {
      return;
    }
    if (sessionStorage.getItem(SESSION_KEY) === "1") {
      startDownload();
    } else {
      passErr.textContent = "";
      passInput.value = "";
      overlay.classList.add("show");
      setTimeout(() => passInput.focus(), 50);
    }
  });

  cancelBtn.addEventListener("click", () => overlay.classList.remove("show"));
  overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.classList.remove("show"); });
  passInput.addEventListener("keydown", (e) => { if (e.key === "Enter") unlockBtn.click(); });

  unlockBtn.addEventListener("click", async () => {
    const entered = passInput.value;
    if (!entered) { passErr.textContent = "Please enter the passcode."; return; }
    const hex = await sha256hex(entered);
    if (hex === PASSCODE_HASH) {
      sessionStorage.setItem(SESSION_KEY, "1");
      overlay.classList.remove("show");
      startDownload();
    } else {
      passErr.textContent = "Incorrect passcode. Try again.";
      passInput.select();
    }
  });

  async function startDownload() {
    const names = files.filter(n => selected.has(n));
    showToast("Preparing…", 0);
    const zip = new JSZip();
    let done = 0;

    for (const name of names) {
      try {
        const resp = await fetch(PHOTOS_DIR + encodeURIComponent(name));
        if (!resp.ok) throw new Error(resp.status);
        const blob = await resp.blob();
        zip.file(name, blob);
      } catch (err) {
        console.error("Failed to fetch", name, err);
      }
      done++;
      showToast("Adding photos " + done + " / " + names.length + "…", (done / names.length) * 70);
    }

    const content = await zip.generateAsync(
      { type: "blob", compression: "STORE" },
      (meta) => showToast("Compressing… " + Math.round(meta.percent) + "%", 70 + meta.percent * 0.3)
    );

    showToast("Starting download…", 100);
    const url = URL.createObjectURL(content);
    const a = document.createElement("a");
    a.href = url;
    a.download = names.length === 1 ? names[0] : "denston-photos.zip";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
    setTimeout(hideToast, 1500);
  }

  function showToast(label, pct) {
    toast.classList.add("show");
    toastLabel.textContent = label;
    toastBar.style.width = Math.min(100, Math.max(0, pct)) + "%";
  }
  function hideToast() { toast.classList.remove("show"); }

  // Esc closes overlays
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      overlay.classList.remove("show");
      closeLightbox();
    }
  });
  </script>
</body>
</html>
